<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crop Disease Detection</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>🌿 AI Crop Disease Detection</h1>

    <p class="subtitle">
        Upload a crop leaf image to detect disease and get treatment recommendations.
    </p>

    <div class="card">

        <form action="/predict" method="POST" enctype="multipart/form-data">

            <label>Select Leaf Image</label>

            <input
                type="file"
                name="leaf_image"
                accept=".jpg,.jpeg,.png"
                required
            >

            <button type="submit">
                Detect Disease
            </button>

        </form>

    </div>

    <div class="info">

        <h2>Supported Crops</h2>

        <ul>
            <li>🍅 Tomato</li>
            <li>🥔 Potato</li>
            <li>🌽 Corn</li>
            <li>🍎 Apple</li>
        </ul>

    </div>

</div>

</body>
</html>
